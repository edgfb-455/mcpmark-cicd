on:
  push:
    branches: [ main ]

jobs:
  pre-deployment:
    runs-on: ubuntu-latest
    outputs:
      issue_number: ${{ steps.issue_number.outputs.issue_number }}
      previous_commit: ${{ steps.get_previous_commit.outputs.previous_commit }}
      package_version: ${{ steps.get_package_version.outputs.package_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint || echo "Lint check failed (adjust script if needed)"

      - name: Run tests
        run: npm test || echo "Test check failed (adjust script if needed)"

      - name: Get previous commit
        id: get_previous_commit
        run: echo "previous_commit=$(git rev-parse HEAD~1)" >> $GITHUB_OUTPUT

      - name: Get package version
        id: get_package_version
        run: echo "package_version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT

      - name: Create deployment tracking issue
        id: create_issue
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issueTitle = `Deployment Tracking - ${context.sha}`;
            const issueBody = `Deployment in progress for commit ${context.sha}\nPrevious Commit: ${{ steps.get_previous_commit.outputs.previous_commit }}\nPackage Version: ${{ steps.get_package_version.outputs.package_version }}`;
            
            const issue = await github.rest.issues.create({
              owner,
              repo,
              title: issueTitle,
              body: issueBody,
              labels: ['deployment', 'in-progress']
            });
            
            return issue.data.number;
          result-encoding: string

      - name: Set issue number output
        id: issue_number
        run: echo "issue_number=${{ steps.create_issue.outputs.result }}" >> $GITHUB_OUTPUT

      - name: Post pre-deployment comment
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: ${{ steps.issue_number.outputs.issue_number }},
              body: "Pre-deployment checks completed"
            });

  rollback-preparation:
    runs-on: ubuntu-latest
    needs: pre-deployment
    outputs:
      rollback_artifact_name: ${{ steps.create_rollback_package.outputs.artifact_name }}
      sha256_checksum: ${{ steps.generate_checksum.outputs.sha256 }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Create rollback directory
        run: mkdir -p rollback-package/backups

      - name: Create rollback script
        run: |
          cat > rollback-package/rollback.sh << 'EOF'
          #!/bin/bash
          set -euo pipefail

          # Rollback Script for Node.js Deployment
          echo "=== Starting Rollback Process ==="

          # Validate inputs
          if [ -z "${PREVIOUS_COMMIT:-}" ]; then
            echo "Error: PREVIOUS_COMMIT environment variable not set"
            exit 1
          fi

          # Revert to previous commit
          echo "1. Reverting to previous commit: $PREVIOUS_COMMIT"
          git checkout "$PREVIOUS_COMMIT"

          # Restore configuration files
          echo "2. Restoring configuration files"
          cp -f backups/package.json .
          cp -f backups/package-lock.json .

          # Reinstall dependencies
          echo "3. Reinstalling dependencies"
          npm ci

          # Verify rollback
          echo "4. Verifying rollback"
          npm test -- --no-watch

          echo "=== Rollback Completed Successfully ==="
          EOF
          chmod +x rollback-package/rollback.sh

      - name: Create dependency verification script
        run: |
          cat > rollback-package/verify-deps.sh << 'EOF'
          #!/bin/bash
          set -euo pipefail

          # Dependency Compatibility Verification
          echo "=== Verifying Dependency Compatibility ==="

          # Check for vulnerable dependencies
          echo "1. Checking for production vulnerabilities"
          npm audit --production --audit-level=moderate

          # Verify dependency tree consistency
          echo "2. Verifying dependency tree"
          npm ls --production --depth=0

          echo "=== Dependency Verification Completed ==="
          EOF
          chmod +x rollback-package/verify-deps.sh

      - name: Create rollback documentation
        run: |
          cat > rollback-package/rollback-docs.md << EOF
          # Rollback Documentation for Deployment ${{ github.sha }}

          ## Overview
          This document provides step-by-step instructions to rollback to the previous stable commit (${{ needs.pre-deployment.outputs.previous_commit }}).

          ## Prerequisites
          - GitHub CLI installed (optional, for artifact download)
          - Node.js ${{ steps.setup-node.outputs.node-version }} installed
          - Git installed

          ## Rollback Steps
          1. **Download Rollback Artifact**
             - From GitHub Actions, download the artifact: \`${{ steps.create_rollback_package.outputs.artifact_name }}\`
             - Or use GitHub CLI: \`gh run download --name ${{ steps.create_rollback_package.outputs.artifact_name }}\`

          2. **Extract Package**
             \`\`\`bash
             unzip ${{ steps.create_rollback_package.outputs.artifact_name }}.zip
             cd rollback-package
             \`\`\`

          3. **Execute Rollback**
             \`\`\`bash
             ./rollback.sh
             \`\`\`

          4. **Verify Deployment**
             - Run tests: \`npm test\`
             - Check application status: \`npm start\` (adjust as needed)

          ## Rollback Details
          - Target Commit: ${{ needs.pre-deployment.outputs.previous_commit }}
          - Original Commit: ${{ github.sha }}
          - Package Version: ${{ needs.pre-deployment.outputs.package_version }}
          EOF

      - name: Backup configuration files
        run: |
          cp package.json rollback-package/backups/
          cp package-lock.json rollback-package/backups/
          if [ -f .env.example ]; then
            cp .env.example rollback-package/backups/
          fi

      - name: Create rollback package
        id: create_rollback_package
        run: |
          ARTIFACT_NAME="rollback-package-${{ github.sha }}"
          zip -r "${ARTIFACT_NAME}.zip" rollback-package/
          echo "artifact_name=${ARTIFACT_NAME}" >> $GITHUB_OUTPUT

      - name: Generate SHA256 checksum
        id: generate_checksum
        run: |
          CHECKSUM=$(sha256sum "${{ steps.create_rollback_package.outputs.artifact_name }}.zip" | awk '{print $1}')
          echo "sha256=${CHECKSUM}" >> $GITHUB_OUTPUT

      - name: Upload rollback artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.create_rollback_package.outputs.artifact_name }}
          path: ${{ steps.create_rollback_package.outputs.artifact_name }}.zip
          retention-days: 30
          if-no-files-found: error

      - name: Post rollback plan comment
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issueNumber = ${{ needs.pre-deployment.outputs.issue_number }};
            const artifactName = ${{ steps.create_rollback_package.outputs.artifact_name }};
            const checksum = ${{ steps.generate_checksum.outputs.sha256 }};
            const previousCommit = ${{ needs.pre-deployment.outputs.previous_commit }};
            const currentCommit = ${{ github.sha }};
            const packageVersion = ${{ needs.pre-deployment.outputs.package_version }};

            const commentBody = `
            # 🔄 Rollback Plan Ready

            **Previous Commit:** \`${previousCommit}\`
            **Current Commit:** \`${currentCommit}\`
            **Package Version:** \`${packageVersion}\`
            **Artifact:** \`${artifactName}\`

            ✅ Rollback script created
            ✅ Configuration backup completed
            ✅ Dependency verification script created
            ✅ Rollback documentation prepared
            ✅ Compressed rollback package generated

            ## Quick Rollback Command
            \`\`\`bash
            # Download and extract the rollback package
            unzip ${artifactName}.zip
            cd rollback-package
            ./rollback.sh
            \`\`\`

            **Rollback script created:** true
            **Configuration backup:** true
            **SHA256:** \`${checksum}\`
            `;

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issueNumber,
              body: commentBody
            });

  post-deployment:
    runs-on: ubuntu-latest
    needs: [pre-deployment, rollback-preparation]
    steps:
      - name: Update issue labels
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issueNumber = ${{ needs.pre-deployment.outputs.issue_number }};

            await github.rest.issues.removeLabel({
              owner,
              repo,
              issue_number: issueNumber,
              name: 'in-progress'
            });

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: issueNumber,
              labels: ['completed']
            });

      - name: Post final deployment comment
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issueNumber = ${{ needs.pre-deployment.outputs.issue_number }};
            const artifactName = ${{ needs.rollback-preparation.outputs.rollback_artifact_name }};
            const checksum = ${{ needs.rollback-preparation.outputs.sha256_checksum }};

            const commentBody = `
            # Deployment Completed Successfully

            The deployment for commit \`${{ github.sha }}\` has been completed.

            **Rollback Artifact Details:**
            - Artifact Name: \`${artifactName}\`
            - SHA256 Checksum: \`${checksum}\`
            - Retention Period: 30 days

            The rollback package is available in the GitHub Actions artifacts for this run.
            `;

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issueNumber,
              body: commentBody
            });

      - name: Close deployment issue
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issueNumber = ${{ needs.pre-deployment.outputs.issue_number }};

            await github.rest.issues.update({
              owner,
              repo,
              issue_number: issueNumber,
              state: 'closed'
            });
